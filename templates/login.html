<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Complaint Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Body Styling */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('/static/bg3.jpg'); /* Background image path */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        /* Header Styling */
        header {
            text-align: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
        }

        /* Navbar Styling */
        .navbar {
            background-color: rgba(0, 0, 0, 0.7);
            overflow: hidden;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar a {
            display: inline-block;
            color: white;
            text-align: center;
            padding: 16px 20px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background-color 0.3s ease;
        }

        .navbar a:hover {
            background-color: #f0a500;
        }

        /* Content Section Styling */
        .content {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9); /* Semi-transparent white background */
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .content h2 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .content p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 1rem;
            color: #333;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        .input-group input:focus {
            border-color: #3b5998;
            outline: none;
        }

        .btn {
            padding: 10px 25px;
            background-color: #3b5998;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1rem;
            display: inline-block;
            width: 100%;
            text-align: center;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .btn:hover {
            background-color: #2d4373;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(1);
        }

        /* Footer Styling */
        footer {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 1rem;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        footer p {
            margin: 0;
            font-size: 1rem;
        }

        /* Responsive Design for Mobile */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 20px;
            }

            .btn {
                font-size: 1rem;
                padding: 12px 25px;
            }

            .navbar a {
                font-size: 1rem;
                padding: 12px;
            }
        }

        @media (max-width: 480px) {
            .navbar a {
                padding: 10px;
            }

            .content h2 {
                font-size: 1.8rem;
            }

            .content p {
                font-size: 1rem;
            }

            .btn {
                font-size: 1rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>AI-Powered Complaint Management System</h1>
</header>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/login">Login</a>
    <a href="/register">Register</a>
</div>

<div class="content">
    <h2>Login</h2>
    <p>Welcome back! Please enter your credentials to log in.</p>

    <form method="POST" action="/login">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>

    <p>Don't have an account? <a href="/register" style="color: #3b5998;">Register here</a></p>
</div>

<footer>
    <p>&copy; 2025 AI Complaint Management System. All rights reserved.</p>
</footer>

<!-- JavaScript to handle pop-up alerts -->
<script>
    // Pass Flask flash messages to JavaScript
    const flashMessage = "{{ get_flashed_messages(category_filter=['success', 'error']) | tojson | safe }}";
    const messages = JSON.parse(flashMessage);

    // Show alerts based on messages
    messages.forEach(msg => {
        if (msg.category === 'success') {
            Swal.fire({
                icon: 'success',
                title: 'Success!',
                text: msg.message,
            });
        } else if (msg.category === 'error') {
            Swal.fire({
                icon: 'error',
                title: 'Error!',
                text: msg.message,
            });
        }
    });
</script>

</body>
</html>
