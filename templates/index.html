<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petition Submission</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #f0f8ff, #add8e6);
            color: #333;
        }

        header {
            background-color: #0077b6;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        main h2 {
            text-align: center;
            color: #0077b6;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            resize: none;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background-color: #0077b6;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #005f86;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            color: #777;
            font-size: 0.9rem;
        }

        footer a {
            color: #0077b6;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Petition Submission Portal</h1>
    </header>
    <main>
        <h2>Submit Your Petition</h2>
        <form action="/submit" method="POST">
            <label for="petition_text">Enter your petition:</label>
            <textarea id="petition_text" name="petition_text" placeholder="Write your petition here..." required></textarea>
            <button type="submit">Submit Petition</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2025 Petition Management System | <a href="/status">View Petition Status</a></p>
    </footer>
</body>
</html>
