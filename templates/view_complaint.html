<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Complaint</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            padding: 20px;
            background-color: white;
            margin: 20px auto;
            width: 60%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #333;
            color: white;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Complaint Details</h1>
    <table>
        <tr>
            <th>Complaint ID</th>
            <td>{{ complaint[0] }}</td>
        </tr>
        <tr>
            <th>Username</th>
            <td>{{ complaint[1] }}</td>
        </tr>
        <tr>
            <th>Description</th>
            <td>{{ complaint[2] }}</td>
        </tr>
        <tr>
            <th>Category</th>
            <td>{{ complaint[3] }}</td>
        </tr>
        <tr>
            <th>Urgency Level</th>
            <td>{{ complaint[4] }}</td>
        </tr>
        <tr>
            <th>Registered Date and Time</th>
            <td>{{ complaint[5] }}</td>
        </tr>
    </table>
    <a href="{{ url_for('admin_dashboard') }}" class="btn">Back to Dashboard</a>
</div>

<footer>
    <p>&copy; 2025 AI Complaint Management System. All rights reserved.</p>
</footer>

</body>
</html>
